<script>
        const qtyInput = document.getElementById('qty-input');
        const unitSelect = document.getElementById('unit-select');
        const kcalDisp = document.getElementById('kcal-display');
        const protDisp = document.getElementById('prot-display');
        const carbDisp = document.getElementById('carb-display');
        const fatDisp = document.getElementById('fat-display');

        const BASE_KCAL = 165;
        const BASE_PROT = 31;
        const BASE_CARB = 0;
        const BASE_FAT = 3.6;

        function updateNutrition() {
            let qty = parseFloat(qtyInput.value) || 0;
            const ratio = qty / 100;

            const finalKcal = Math.round(BASE_KCAL * ratio);
            const finalProt = Math.round(BASE_PROT * ratio);
            const finalCarb = (BASE_CARB * ratio).toFixed(1);
            const finalFat = (BASE_FAT * ratio).toFixed(1);

            kcalDisp.innerText = finalKcal;
            protDisp.innerText = `${finalProt}g`;
            carbDisp.innerText = `${finalCarb}g`;
            fatDisp.innerText = `${finalFat}g`;
        }

        qtyInput.addEventListener('input', updateNutrition);
        unitSelect.addEventListener('change', updateNutrition);

        document.querySelectorAll('.active-interaction').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
            btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('scale-95'));
        });
    </script>
