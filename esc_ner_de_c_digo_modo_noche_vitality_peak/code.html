<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vitality Peak - Barcode Scanner</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Hanken+Grotesk:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Shared Components Logic & Theme Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "on-primary": "#ffffff",
                "on-tertiary": "#ffffff",
                "inverse-on-surface": "#eaf1ff",
                "primary-fixed": "#6ffbbe",
                "surface-dim": "#121318",
                "secondary-fixed-dim": "#ffb690",
                "surface-tint": "#4edea3",
                "primary-fixed-dim": "#4edea3",
                "error": "#ffb4ab",
                "outline-variant": "#44474e",
                "inverse-surface": "#e2e2e6",
                "on-secondary-container": "#ffdbca",
                "primary": "#4edea3",
                "surface-bright": "#38393e",
                "surface-container": "#1e1f24",
                "tertiary": "#89ceff",
                "primary-container": "#005236",
                "on-secondary": "#542100",
                "surface-variant": "#44474e",
                "on-primary-fixed-variant": "#005236",
                "on-tertiary-fixed": "#001e2f",
                "error-container": "#93000a",
                "secondary-container": "#783200",
                "tertiary-fixed": "#c9e6ff",
                "on-error": "#690005",
                "on-tertiary-container": "#c9e6ff",
                "on-surface": "#e2e2e6",
                "secondary": "#ffb690",
                "on-surface-variant": "#c4c6cf",
                "outline": "#8e9099",
                "surface-container-highest": "#33353a",
                "secondary-fixed": "#ffdbca",
                "on-primary-container": "#6ffbbe",
                "on-error-container": "#ffdad6",
                "inverse-primary": "#006c49",
                "surface-container-lowest": "#0c0e13",
                "tertiary-container": "#004c6e",
                "on-secondary-fixed-variant": "#783200",
                "surface-container-low": "#1a1b20",
                "tertiary-fixed-dim": "#89ceff",
                "surface-container-high": "#282a2f",
                "surface": "#121318",
                "on-background": "#e2e2e6",
                "background": "#121318",
                "on-secondary-fixed": "#341100",
                "on-tertiary-fixed-variant": "#004c6e",
                "on-primary-fixed": "#002113"
            },
            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            "spacing": {
                "base": "8px",
                "xs": "4px",
                "gutter": "20px",
                "lg": "24px",
                "container-margin-desktop": "40px",
                "sm": "12px",
                "xl": "32px",
                "container-margin-mobile": "16px",
                "md": "16px",
                "xxl": "48px"
            },
            "fontFamily": {
                "label-sm": ["Inter"],
                "title-lg": ["Inter"],
                "body-lg": ["Inter"],
                "label-md": ["Inter"],
                "display-lg": ["Hanken Grotesk"],
                "body-md": ["Inter"],
                "headline-lg": ["Hanken Grotesk"],
                "headline-lg-mobile": ["Hanken Grotesk"],
                "headline-md": ["Hanken Grotesk"]
            },
            "fontSize": {
                "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .scan-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #4edea3, transparent);
            box-shadow: 0 0 15px #4edea3;
            position: absolute;
            width: 100%;
            top: 0;
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { top: 10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 90%; opacity: 0; }
        }

        .viewfinder-corner {
            width: 32px;
            height: 32px;
            border-color: #4edea3;
            position: absolute;
        }

        .pulse-soft {
            animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .glass-overlay {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md text-body-md">
<!-- Top Navigation -->
<header class="h-16 flex items-center justify-between px-container-margin-mobile md:px-container-margin-desktop bg-surface-container-low shadow-sm z-50">
<button class="flex items-center text-primary active:scale-95 transition-transform duration-100">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">NutriTrack Pro</h1>
<div class="w-6"></div> <!-- Spacer -->
</header>
<main class="flex-grow flex flex-col items-center justify-center p-container-margin-mobile md:p-container-margin-desktop relative overflow-hidden">
<!-- Background Camera Feed Simulation -->
<div class="absolute inset-0 z-0 overflow-hidden bg-surface-container-lowest">
<div class="w-full h-full object-cover opacity-30 scale-110 blur-md" data-alt="A focused close-up shot of various colorful healthy grocery items on a kitchen counter, seen through a slightly blurred camera lens perspective. The lighting is moody and focused." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCsW1-QzQ4bAyrJFJOiTtTSEGdy8qQdnoGS4JtNmZuMgud2cjC3eb1ukIR64wNntqVIUZg0gdPgsmIR2VKTqsIBRyGqcjmpzqfmqYpukAJO2IkcX_P7klPogaRkFgylFizS-K3XK7K5hZodg_9K48xdpQSQAT4Ib3uaKeVP8o8tbXxKlmmnQyUXoAVcPCzOE5HmGPqtUQPBfVqTFba4bNseE0-x4uym0wOIbe61wgq0d5cTXHNKsGB5lcyNwkIbpvW2CtZP7arpwRA')"></div>
</div>
<!-- Scanner Viewfinder Container -->
<div class="relative z-10 w-full max-w-md aspect-square flex flex-col items-center justify-center">
<!-- Scanning Box Overlay -->
<div class="w-72 h-72 md:w-80 md:h-80 relative border-2 border-white/10 rounded-xl overflow-hidden glass-overlay">
<!-- Viewfinder Corners -->
<div class="viewfinder-corner top-0 left-0 border-t-4 border-l-4 rounded-tl-lg"></div>
<div class="viewfinder-corner top-0 right-0 border-t-4 border-r-4 rounded-tr-lg"></div>
<div class="viewfinder-corner bottom-0 left-0 border-b-4 border-l-4 rounded-bl-lg"></div>
<div class="viewfinder-corner bottom-0 right-0 border-b-4 border-r-4 rounded-br-lg"></div>
<!-- Animated Scanning Line -->
<div class="scan-line"></div>
<!-- Simulation Content Inside Viewfinder -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20">
<span class="material-symbols-outlined text-[80px] text-on-surface">barcode_scanner</span>
</div>
</div>
<!-- Scanner Text Status -->
<div class="mt-lg text-center">
<p class="font-label-md text-label-md text-on-surface pulse-soft flex items-center justify-center gap-base">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">sync</span>
                Escaneando código de barras...
            </p>
</div>
</div>
<!-- Mock Result Card -->
<div class="z-20 mt-xl w-full max-w-sm bg-surface-container-high rounded-xl p-md shadow-2xl transform translate-y-4 opacity-0 transition-all duration-500 ease-out" id="result-card">
<div class="flex items-start gap-md">
<div class="bg-primary-container p-sm rounded-lg text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="flex-grow">
<h3 class="font-title-lg text-title-lg text-on-surface">Atún en lata</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Encontrado en base de datos</p>
<div class="mt-sm flex gap-xs flex-wrap">
<span class="px-base py-1 bg-surface-container-highest rounded-full text-label-sm font-label-sm text-primary">ALTA PROTEÍNA</span>
<span class="px-base py-1 bg-surface-container-highest rounded-full text-label-sm font-label-sm text-tertiary">KETO</span>
</div>
</div>
</div>
<div class="mt-md pt-md border-t border-outline-variant flex flex-col sm:flex-row gap-md">
<button class="flex-1 py-sm bg-primary text-on-primary font-label-md text-label-md rounded-lg active:scale-95 transition-all duration-100 hover:brightness-110">
                Añadir al Log
            </button>
<button class="flex-1 py-sm bg-surface-container-low text-primary font-label-md text-label-md rounded-lg border border-outline active:scale-95 transition-all duration-100 flex items-center justify-center gap-xs hover:bg-surface-container-high" id="rescan-btn">
<span class="material-symbols-outlined text-[18px]">refresh</span>
                Escanear de nuevo
            </button>
</div>
</div>
<!-- Manual Entry Link -->
<div class="z-20 mt-xl">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary underline underline-offset-4 decoration-primary transition-colors" href="#">
            No se encuentra el producto? Cargar manualmente
        </a>
</div>
</main>
<script>
    // Simple interaction simulation
    document.addEventListener('DOMContentLoaded', () => {
        const resultCard = document.getElementById('result-card');
        const rescanBtn = document.getElementById('rescan-btn');

        // Simulate finding a product after 2 seconds
        setTimeout(() => {
            resultCard.classList.remove('translate-y-4', 'opacity-0');
        }, 2000);

        rescanBtn.addEventListener('click', () => {
            resultCard.classList.add('translate-y-4', 'opacity-0');
            setTimeout(() => {
                resultCard.classList.remove('translate-y-4', 'opacity-0');
            }, 2500);
        });
    });
</script>
</body></html>
