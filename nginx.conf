server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets (Vite genera nombres con hash) - cache inmortal
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # El documento se revalida siempre, pero puede participar del back/forward cache.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
